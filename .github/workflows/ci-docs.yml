name: CI Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'activemq-cpp/src/main/**/*.h'
      - 'activemq-cpp/doxygen.cfg'
      - '.github/workflows/ci-docs.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'activemq-cpp/src/main/**/*.h'
      - 'activemq-cpp/doxygen.cfg'
      - '.github/workflows/ci-docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Doxygen Docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Doxygen
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz

    - name: Build documentation
      working-directory: activemq-cpp
      env:
        PROJECT: neoactivemq-cpp
        VERSION: ${{ github.ref_name }}
        SRCDIR: .
        DOCDIR: ${{ github.workspace }}/output/docs
        GENERATE_HTML: YES
        GENERATE_CHM: NO
        GENERATE_LATEX: NO
      run: |
        mkdir -p "${{ github.workspace }}/output/docs"
        doxygen doxygen.cfg

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: doxygen-docs
        path: output/docs/html/
        retention-days: 7

    - name: Upload Pages artifact
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-pages-artifact@v4
      with:
        path: output/docs/html/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
