services:
  # Default single broker for basic integration tests
  activemq:
    image: ${ACTIVEMQ_IMAGE:-apache/activemq-classic:5.18.7}
    container_name: activemq-test
    ports:
      - "127.0.0.1:61616:61616"  # OpenWire (localhost only)
      - "127.0.0.1:61613:61613"  # STOMP (localhost only)
      - "127.0.0.1:8161:8161"    # Web Console (localhost only)
    volumes:
      - ./docker/activemq-integration.xml:/opt/apache-activemq/conf/activemq.xml:ro
    environment:
      - ACTIVEMQ_OPTS=-Xms512m -Xmx2g -Djetty.host=0.0.0.0
    # Raise broker FD and thread limits so high-fanout tests (5000 connections,
    # each requiring broker-side threads and sockets) do not hit defaults.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/admin || curl -sf http://localhost:8161/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # SSL INTEGRATION TEST BROKER
  # Use with: docker compose --profile ssl up
  #
  # Certificates are generated automatically by the ssl-cert-generator service.
  #
  # Exposes:
  #   - Port 61617: SSL OpenWire (ssl://)
  #   - Port 8165: Web Console (remapped to avoid conflict with default broker)
  # ============================================================================

  # Generate SSL certificates for ActiveMQ SSL testing.
  # Active under both the Classic SSL ("ssl") and Artemis SSL ("artemis-ssl")
  # profiles - the same PKCS12 keystore/truststore artifacts work for both.
  ssl-cert-generator:
    image: alpine/openssl:latest
    container_name: activemq-ssl-cert-generator
    profiles: ["ssl", "artemis-ssl"]
    volumes:
      - ./docker/ssl/generate-certs-entrypoint.sh:/generate-certs.sh:ro
      - ./docker/ssl/certs:/certs
    entrypoint: ["/bin/sh"]
    command: ["/generate-certs.sh"]
    restart: "no"

  # Broker with SSL transport connector for SSL integration testing
  activemq-ssl:
    image: ${ACTIVEMQ_IMAGE:-apache/activemq-classic:5.18.7}
    container_name: activemq-ssl-test
    profiles: ["ssl"]
    depends_on:
      ssl-cert-generator:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:61617:61617"  # SSL OpenWire (localhost only)
      - "127.0.0.1:8165:8161"    # Web Console (localhost only, remapped to avoid conflict with default broker)
    volumes:
      - ./docker/ssl/activemq-ssl.xml:/opt/apache-activemq/conf/activemq.xml:ro
      - ./docker/ssl/certs:/opt/apache-activemq/conf/certs:ro
    environment:
      - ACTIVEMQ_OPTS=-Xms512m -Xmx2g -Djetty.host=0.0.0.0
    # Raise broker FD and thread limits for high-fanout tests.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/admin || curl -sf http://localhost:8161/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # FAILOVER AND MULTI-CONNECTION TEST BROKERS
  # Use with: docker compose --profile failover up
  #
  # Supported ActiveMQ Classic versions (set ACTIVEMQ_IMAGE env var):
  #   - apache/activemq-classic:5.18.7 (default; the activemq-classic repo
  #     is archived and only this tag is available)
  #   - apache/activemq:5.19.6 (newer versions live under apache/activemq)
  #   - apache/activemq:6.2.5
  #
  # Example:
  #   ACTIVEMQ_IMAGE=apache/activemq:6.2.5 docker compose --profile failover up -d
  # ============================================================================

  # Broker 1 for failover testing (primary)
  activemq1:
    image: ${ACTIVEMQ_IMAGE:-apache/activemq-classic:5.18.7}
    container_name: activemq-failover-1
    profiles: ["failover"]
    ports:
      - "127.0.0.1:61617:61616"  # OpenWire on port 61617
      - "127.0.0.1:61614:61613"  # STOMP on port 61614
      - "127.0.0.1:8162:8161"    # Web Console on port 8162
    environment:
      - ACTIVEMQ_OPTS=-Xms256m -Xmx1g -Djetty.host=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/admin || curl -sf http://localhost:8161/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Broker 2 for failover testing (secondary)
  activemq2:
    image: ${ACTIVEMQ_IMAGE:-apache/activemq-classic:5.18.7}
    container_name: activemq-failover-2
    profiles: ["failover"]
    ports:
      - "127.0.0.1:61618:61616"  # OpenWire on port 61618
      - "127.0.0.1:61615:61613"  # STOMP on port 61615
      - "127.0.0.1:8163:8161"    # Web Console on port 8163
    environment:
      - ACTIVEMQ_OPTS=-Xms256m -Xmx1g -Djetty.host=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/admin || curl -sf http://localhost:8161/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Broker 3 for multi-connection testing (independent broker)
  activemq3:
    image: ${ACTIVEMQ_IMAGE:-apache/activemq-classic:5.18.7}
    container_name: activemq-multi-3
    profiles: ["failover"]
    ports:
      - "127.0.0.1:61619:61616"  # OpenWire on port 61619
      - "127.0.0.1:61620:61613"  # STOMP on port 61620
      - "127.0.0.1:8164:8161"    # Web Console on port 8164
    environment:
      - ACTIVEMQ_OPTS=-Xms256m -Xmx1g -Djetty.host=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/admin || curl -sf http://localhost:8161/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # ACTIVEMQ ARTEMIS INTEGRATION TEST BROKER
  # Use with: docker compose --profile artemis up
  #
  # Artemis is the next-generation ActiveMQ broker. It uses a different
  # configuration format (broker.xml) than Classic. The broker.xml mounted here:
  #   - Exposes OpenWire only on port 61616 (STOMP/AMQP/MQTT are intentionally
  #     not exposed; Artemis CI runs the OpenWire integration suite only)
  #   - Disables security so existing integration tests can connect anonymously
  #   - Enables persistence so XA prepared transactions are journaled (XA
  #     two-phase commit requires durable storage)
  #
  # Note: tests requiring Classic-specific features (kahaDB persistence
  # semantics, advisory topics for connection tracking, broker-specific JMX)
  # may behave differently or fail against Artemis. The library defaults
  # watchTopicAdvisories to false, which improves Artemis compatibility.
  # ============================================================================
  activemq-artemis:
    image: ${ACTIVEMQ_ARTEMIS_IMAGE:-apache/artemis:2.53.0}
    container_name: activemq-artemis-test
    profiles: ["artemis"]
    ports:
      - "127.0.0.1:61616:61616"  # OpenWire (localhost only)
      - "127.0.0.1:8161:8161"    # Web Console (localhost only)
    # The broker.xml is mounted into etc-override/. The Apache Artemis
    # image's entrypoint (/docker-run.sh) copies any files from
    # ./etc-override/ (i.e. /var/lib/artemis-instance/etc-override/) into
    # the broker's etc/ directory AFTER it runs `artemis create`, so the
    # broker starts with our config but is created normally (login.config,
    # jolokia, logging, etc. all set up properly).
    volumes:
      - ./docker/artemis/broker.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro
    environment:
      - ANONYMOUS_LOGIN=true
      - ARTEMIS_USER=artemis
      - ARTEMIS_PASSWORD=artemis
    # Raise broker FD and thread limits for high-fanout tests.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/console/ || curl -sf http://localhost:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================================================
  # ACTIVEMQ ARTEMIS SSL INTEGRATION TEST BROKER
  # Use with: docker compose --profile artemis-ssl up
  #
  # SSL-only Artemis broker exposing OpenWire on port 61617 with TLS enabled.
  # Re-uses the PKCS12 keystore/truststore generated by ssl-cert-generator
  # (the same artifacts the Classic SSL profile uses), mounted directly to
  # /opt/artemis-certs/ (NOT via etc-override because the image's entrypoint
  # uses a flat `cp` that doesn't recurse into subdirectories).
  # ============================================================================
  activemq-artemis-ssl:
    image: ${ACTIVEMQ_ARTEMIS_IMAGE:-apache/artemis:2.53.0}
    container_name: activemq-artemis-ssl-test
    profiles: ["artemis-ssl"]
    depends_on:
      ssl-cert-generator:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:61617:61617"  # SSL OpenWire (localhost only)
      - "127.0.0.1:8161:8161"    # Web Console (localhost only)
    # broker.xml goes through etc-override (entrypoint copies it AFTER
    # `artemis create`). Certs are mounted to a separate absolute path -
    # NOT through etc-override - because some Apache Artemis image versions
    # don't recursively copy etc-override subdirectories, which would leave
    # the broker unable to load the SSL keystore/truststore on startup.
    volumes:
      - ./docker/artemis/broker-ssl.xml:/var/lib/artemis-instance/etc-override/broker.xml:ro
      - ./docker/ssl/certs:/opt/artemis-certs:ro
    environment:
      - ANONYMOUS_LOGIN=true
      - ARTEMIS_USER=artemis
      - ARTEMIS_PASSWORD=artemis
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161/console/ || curl -sf http://localhost:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
